 general {
  # start hyprlock only if it isn't already running
  lock_cmd = pidof hyprlock || hyprlock

  # lock right before suspend
  before_sleep_cmd = loginctl lock-session

  # after waking, make sure displays come back on
  after_sleep_cmd = hyprctl dispatch dpms on

  # make systemd wait for the lock before actually sleeping
  # (this is exactly what this option exists for)
  inhibit_sleep = 3
}

# 5 min idle -> lock
listener {
  timeout = 600
  on-timeout = loginctl lock-session
}

# 10 min idle -> turn monitors off
listener {
  timeout = 900
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on
}

# OPTIONAL: 30 min idle -> suspend
# (comment out if you never want auto-suspend)

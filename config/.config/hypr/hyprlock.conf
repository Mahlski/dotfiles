general {
    disable_loading_bar = true
    grace = 0
}

background {
    monitor =
    color = rgba(15,15,15,1.0)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
}

